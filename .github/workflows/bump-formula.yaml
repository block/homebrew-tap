name: Bump Formula

on:
  workflow_dispatch:
    inputs:
      formula:
        description: Formula name (for example, stoic)
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - name: Activate Hermit
        uses: cashapp/activate-hermit@12a728b03ad41eace0f9abaf98a035e7e8ea2318 # ratchet:cashapp/activate-hermit@v1.1.4

      - name: Generate formula
        id: vars
        shell: bash
        env:
          FORMULA_NAME: ${{ inputs.formula }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          OLD_VERSION=$(sed -nE 's/^\s*version "([^"]+)"\s*$/\1/p' "Formula/${FORMULA_NAME}.rb" | head -n1)

          scripts/generate-formula.sh "$FORMULA_NAME"

          NEW_VERSION=$(sed -nE 's/^\s*version "([^"]+)"\s*$/\1/p' "Formula/${FORMULA_NAME}.rb" | head -n1)
          NEW_TAG=$(gh release view --repo "block/${FORMULA_NAME}" --json tagName --jq .tagName)

          BRANCH="bump-${FORMULA_NAME}-to-${NEW_VERSION}"
          COMMIT_MESSAGE="Bump ${FORMULA_NAME} to ${NEW_VERSION}"

          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "commit_message=${COMMIT_MESSAGE}" >> "$GITHUB_OUTPUT"
          {
            echo "body<<EOF"
            if [[ -n "${OLD_VERSION:-}" && "$OLD_VERSION" != "$NEW_VERSION" ]]; then
              echo "https://github.com/block/${FORMULA_NAME}/compare/v${OLD_VERSION}...${NEW_TAG}"
              echo
            fi
            echo "You can test your changes before merging this pull request with:"
            echo '```sh'
            echo 'git -C $(brew --repo block/tap) fetch'
            echo "git -C \$(brew --repo block/tap) checkout origin/${BRANCH}"
            echo "brew install block/tap/${FORMULA_NAME}"
            echo '```'
            echo
            echo "When you're done, reset the tap with:"
            echo '```sh'
            echo 'git -C $(brew --repo block/tap) checkout main'
            echo '```'
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        id: create_pr
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # ratchet:peter-evans/create-pull-request@v8.1.0
        with:
          token: ${{ github.token }}
          branch: ${{ steps.vars.outputs.branch }}
          commit-message: ${{ steps.vars.outputs.commit_message }}
          title: ${{ steps.vars.outputs.commit_message }}
          body: ${{ steps.vars.outputs.body }}

      - name: Report Pull Request Result
        shell: bash
        env:
          PR_OPERATION: ${{ steps.create_pr.outputs.pull-request-operation }}
          PR_URL: ${{ steps.create_pr.outputs.pull-request-url }}
          PR_BRANCH: ${{ steps.vars.outputs.branch }}
        run: |
          set -euo pipefail

          if [[ "$PR_OPERATION" == "none" || -z "${PR_URL:-}" ]]; then
            echo "No pull request was created because no formula changes were detected."
            echo "Branch: ${PR_BRANCH}"
          else
            echo "Pull request ${PR_OPERATION}: ${PR_URL}"
          fi
