name: Bump Cask

on:
  workflow_dispatch:
    inputs:
      repo:
        description: GitHub repo in owner/name format (for example, block/builderbot)
        required: true
      cask:
        description: Cask name (for example, penpal)
        required: true
      tag:
        description: Release tag (for example, penpal-1.2.3)
        required: true
      artifact_url:
        description: Full GitHub release artifact URL
        required: true
      sha256:
        description: SHA256 for the release artifact (optional)
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-cask:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Bump cask and create/update pull request
        shell: bash
        env:
          BUMP_TYPE: cask
          BUMP_NAME: ${{ inputs.cask }}
          REPO: ${{ inputs.repo }}
          NEW_TAG: ${{ inputs.tag }}
          ARTIFACT_URL: ${{ inputs.artifact_url }}
          INPUT_SHA256: ${{ inputs.sha256 }}
          GH_TOKEN: ${{ github.token }}
          PR_BASE: ${{ github.event.repository.default_branch }}
          PR_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 scripts/bump-and-pr.py
