name: Update QR Go Formula

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.0.11)'
        required: true

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update formula
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          URL="https://github.com/block/qrgo/releases/download/${TAG}/qrgo-release.tar.gz"

          # Download and calculate SHA256
          curl -sL "$URL" -o qrgo-release.tar.gz
          SHA256=$(sha256sum qrgo-release.tar.gz | cut -d' ' -f1)

          # Write updated formula
          cat > Formula/qrgo.rb << EOF
          # This file is auto-generated by .github/workflows/update-qrgo.yaml
          # Do not edit manually - changes will be overwritten on the next release

          class Qrgo < Formula
            desc "A CLI utility for screen-capturing a QR code and launching it in an Android emulator or iOS simulator."
            homepage "https://github.com/block/qrgo"
            url "${URL}"
            sha256 "${SHA256}"
            license "Apache-2.0"
            version "${VERSION}"

            def install
              libexec.install Dir["*"]
              bin.install_symlink libexec/"qrgo"
            end

            test do
              system "\#{bin}/qrgo", "--help"
            end
          end
          EOF

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/qrgo.rb
          git commit -m "Update qrgo to ${TAG}"
          git push