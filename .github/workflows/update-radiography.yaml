name: Update Radiography Formula

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v2.9)'
        required: true

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update formula
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"

          ASSET_NAME=$(curl -s "https://api.github.com/repos/block/radiography/releases/tags/${TAG}" | jq -r '.assets[] | select(.name | test("^radiography-stoic-plugin-.*\\.tar\\.gz$")) | .name' | head -n1)

          if [ -z "$ASSET_NAME" ]; then
            echo "No radiography-stoic-plugin-*.tar.gz asset found for release ${TAG}"
            exit 1
          fi

          URL="https://github.com/block/radiography/releases/download/${TAG}/${ASSET_NAME}"

          # Download and calculate SHA256
          curl -sL "$URL" -o "$ASSET_NAME"
          SHA256=$(sha256sum "$ASSET_NAME" | cut -d' ' -f1)

          # Write updated formula
          cat > Formula/radiography.rb << EOF
          # This file is auto-generated by .github/workflows/update-radiography.yaml
          # Do not edit manually - changes will be overwritten on the next release

          class Radiography < Formula
            desc "CLI for scanning Android view hierarchies via Stoic"
            homepage "https://github.com/block/radiography"
            url "${URL}"
            sha256 "${SHA256}"
            license "Apache-2.0"
            version "${VERSION}"

            depends_on "stoic"

            def install
              libexec.install Dir["*"]
              bin.install_symlink libexec/"radiography-stoic-plugin/radiography"
            end

            test do
              system "\#{bin}/radiography", "--help"
            end
          end
          EOF

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/radiography.rb
          git commit -m "Update radiography to ${TAG}"
          git push
